<!DOCTYPE html>
<html>

<head>
<title>Supervisor Dashboard | UCT WBA</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Supervisor Dashboard</h1>
<p>UCT Department of Paediatrics and Child Health</p>
</header>

<section style="padding:60px 20px; background:#f8fafc;">

<div style="
max-width:1200px;
margin:auto;
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
">

<h2 id="pageTitle" style="text-align:center; margin-bottom:10px;">
Supervisor Assessment Activity
</h2>

<div style="text-align:center; margin-bottom:30px;">
<input type="text" id="supervisorSearch"
placeholder="Search supervisor"
style="
padding:12px 20px;
width:320px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px;">
</div>

<table style="width:100%; border-collapse:collapse; table-layout:fixed;">

<thead>
<tr style="background:#002b5c; color:white; text-align:left;">

<th style="padding:12px; width:25%;">Supervisor</th>
<th style="padding:12px; width:25%;">Registrar</th>
<th style="padding:12px; width:10%;">EPA</th>
<th style="padding:12px; width:20%;">Date</th>
<th style="padding:12px; width:20%;">Entrustment</th>

</tr>
</thead>

<tbody id="supervisorTable"></tbody>

</table>

</div>

</section>

<section style="text-align:center; margin:40px;">

<a href="dashboard.html"
style="
display:inline-block;
padding:12px 30px;
background:#002b5c;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
">

← Back to Programme Dashboard

</a>

</section>

<script>

/* Get supervisor name from URL */
const params = new URLSearchParams(window.location.search);
const selectedSupervisor = params.get("name");
if(selectedSupervisor && selectedSupervisor.trim().toLowerCase() === "alan horn"){

const entered = prompt("Enter password for Alan Horn");

if(entered !== "horn2026"){
      alert("Incorrect password");
      window.location.href = "dashboard.html";
}

}

/* Update page title */
if(selectedSupervisor){
document.getElementById("pageTitle").innerText =
selectedSupervisor + " – Assessment Activity";
}

/* Fetch data from Google Sheet */
fetch("https://docs.google.com/spreadsheets/d/16a8w-y1XCZ-1PcGCJQtW-14WO6IClLOtU0zgykvSCgk/gviz/tq?tqx=out:json&gid=25819344")

.then(res => res.text())
.then(text => {

const json = JSON.parse(text.substr(47).slice(0,-2));
const rows = json.table.rows;

let html = "";

rows.forEach(row => {

const supervisor = row.c[7]?.v || "—";   // Column H
const registrar = row.c[2]?.v || "—";    // Column C
const rawDate = row.c[5]?.v || "—";      // Column F
const entrustment = row.c[32]?.v || "—"; // Column AG

if(registrar === "—") return;

/* Filter by supervisor */
if(selectedSupervisor && !supervisor?.toLowerCase().includes(selectedSupervisor.toLowerCase())
) return;

/* Format date */
let date = rawDate;

if(rawDate && rawDate.startsWith("Date")){
const parts = rawDate.replace("Date(","").replace(")","").split(",");
date = `${parts[2]}/${parseInt(parts[1])+1}/${parts[0]}`;
}

html += `

<tr style="border-bottom:1px solid #f1f3f5;">

<td style="padding:12px;">${supervisor}</td>

<td style="padding:12px;">
<a href="registrar.html?name=${encodeURIComponent(registrar)}"
style="color:#002b5c;font-weight:bold;text-decoration:none;">
${registrar}
</a>
</td>

<td style="padding:12px;">EPA 1</td>

<td style="padding:12px;">${date}</td>

<td style="padding:12px;">
<span style="
background:#0f7c82;
color:white;
padding:6px 14px;
border-radius:20px;
font-size:12px;
font-weight:bold;">
Level ${entrustment}
</span>
</td>

</tr>

`;

});

document.getElementById("supervisorTable").innerHTML = html;

});

      const supervisorSearch = document.getElementById("supervisorSearch");

supervisorSearch.addEventListener("input", function(){

const filter = supervisorSearch.value.toLowerCase();
const rows = document.querySelectorAll("#supervisorTable tr");

rows.forEach(row => {

const text = row.innerText.toLowerCase();

row.style.display =
text.includes(filter) ? "" : "none";

});

});


</script>

</body>

</html>
